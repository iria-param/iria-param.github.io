<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Events — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .event-panel{border:2px solid var(--ink);box-shadow:var(--shadow);margin-bottom:1.5rem;}
    .ep-head{background:var(--ink);color:var(--paper);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;border-bottom:3px solid var(--orange);}
    .ep-body{padding:1.25rem;}
    .ep-meta{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:.75rem;}
    .ep-meta-item{font-size:.78rem;font-family:var(--font-mono);color:var(--grey-dark);}
    .checkin-box{background:var(--grey-light);border:1px solid var(--grey);padding:.75rem 1rem;margin-top:.75rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .checkin-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:.35rem;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// event_registrations + events + event_attendance</div>
      <div class="flex-between" style="flex-wrap:wrap;gap:.75rem;">
        <h1>My Events</h1>
        <a href="events.html" class="btn btn-primary btn-sm">Browse Events →</a>
      </div>
    </div>

    <div class="filter-row" style="margin-bottom:1.5rem;" id="tabRow">
      <button class="filter-chip active" onclick="setTab('upcoming',this)">Upcoming</button>
      <button class="filter-chip" onclick="setTab('past',this)">Past</button>
      <button class="filter-chip" onclick="setTab('all',this)">All</button>
    </div>

    <div id="eventsContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let currentUser, allRegs = [], myAttendance = [];
let currentTab = 'upcoming';

onReady(async () => {
  try {
    await renderNav();
    currentUser = await Auth.requireAuth('auth.html');
    if (!currentUser) return;
    const { data: prof } = await db.from('maker_profiles').select('*').eq('user_id', currentUser.id).single();
    renderSidebar('events', prof, currentUser);
    await loadData();
  } catch(e) {
    $('eventsContent').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
});

async function loadData() {
  const [regRes, attRes] = await Promise.all([
    db.from('event_registrations')
      .select('*, events(id,title,slug,event_type,venue,city,start_at,end_at,capacity,status,summary)')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false }),
    db.from('event_attendance')
      .select('*')
      .eq('user_id', currentUser.id),
  ]);
  allRegs = regRes.data || [];
  myAttendance = attRes.data || [];
  renderTab();
}

function setTab(tab, btn) {
  currentTab = tab;
  $$('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderTab();
}

function renderTab() {
  const now = new Date();
  let regs = allRegs;
  if (currentTab === 'upcoming') {
    regs = allRegs.filter(r => r.events && new Date(r.events.start_at) >= now);
  } else if (currentTab === 'past') {
    regs = allRegs.filter(r => r.events && new Date(r.events.start_at) < now);
  }

  if (!regs.length) {
    $('eventsContent').innerHTML = `<div class="empty-state">
      <div class="empty-icon">📅</div>
      <h3>No ${currentTab === 'all' ? '' : currentTab + ' '}events</h3>
      <p>${currentTab==='upcoming' ? 'No upcoming registrations.' : currentTab==='past' ? 'No past events yet.' : 'Register for an event to see it here.'}
        <a href="events.html" class="link">Browse events →</a></p>
    </div>`;
    return;
  }

  $('eventsContent').innerHTML = regs.map(r => renderCard(r)).join('');
}

function renderCard(r) {
  const ev = r.events;
  if (!ev) return '';
  const now = new Date();
  const start = new Date(ev.start_at);
  const isPast = start < now;
  const isToday = start.toDateString() === now.toDateString();
  const attendance = myAttendance.find(a => a.event_id === ev.id);
  const checkedIn = attendance?.attendance_status === 'present';

  return `<div class="event-panel">
    <div class="ep-head">
      <div>
        <div class="flex-wrap gap-sm mb-1">
          ${isToday ? '<span style="background:var(--teal);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .4rem;">TODAY</span>'
            : isPast ? '<span style="background:var(--grey-dark);color:#fff;font-size:.65rem;padding:.15rem .4rem;">PAST</span>'
            : '<span style="background:var(--orange);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .4rem;">UPCOMING</span>'}
          ${ev.event_type ? `<span class="badge badge-grey">${ev.event_type.replace(/_/g,' ')}</span>` : ''}
          <span class="badge badge-${r.registration_status==='confirmed'?'green':'grey'}">${r.registration_status||'registered'}</span>
        </div>
        <div style="font-weight:800;font-size:1.05rem;">${ev.title}</div>
        ${ev.venue ? `<div class="mono text-xs" style="opacity:.5;margin-top:.15rem;">📍 ${ev.venue}${ev.city?', '+ev.city:''}</div>` : ''}
      </div>
      ${!isPast && r.registration_status !== 'cancelled' ? `
        <button class="btn btn-sm btn-ghost" onclick="cancelReg('${r.id}')">Cancel Registration</button>` : ''}
    </div>
    <div class="ep-body">
      ${ev.summary ? `<p class="text-sm text-grey mb-3">${ev.summary}</p>` : ''}
      <div class="ep-meta">
        <span class="ep-meta-item">📅 ${formatDate(ev.start_at)}</span>
        ${ev.end_at ? `<span class="ep-meta-item">→ ${formatDate(ev.end_at)}</span>` : ''}
        ${ev.capacity ? `<span class="ep-meta-item">👥 Capacity: ${ev.capacity}</span>` : ''}
        <span class="ep-meta-item">🗓 Registered: ${formatDate(r.created_at)}</span>
      </div>
      <div class="checkin-box">
        <span>
          <span class="checkin-dot" style="background:${checkedIn?'var(--green)':isPast?'var(--grey-dark)':'var(--orange)'}"></span>
          <strong>${checkedIn ? '✓ Attended' : isPast ? 'Did not check in' : 'Check-in pending'}</strong>
        </span>
        ${checkedIn && attendance?.verified_at ? `<span class="mono text-xs text-grey">Verified: ${formatDate(attendance.verified_at)}</span>` : ''}
        ${isToday && !checkedIn ? `<span class="badge badge-orange">Show this to staff to check in</span>` : ''}
      </div>
    </div>
  </div>`;
}

async function cancelReg(regId) {
  if (!confirm('Cancel this registration?')) return;
  const { error } = await db.from('event_registrations')
    .update({ registration_status: 'cancelled' })
    .eq('id', regId).eq('user_id', currentUser.id);
  if (error) { alert(error.message); return; }
  await loadData();
}
</script>
</body>
</html>
