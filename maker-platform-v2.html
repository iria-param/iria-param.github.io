<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MakerPath — Challenge Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:  #FFE040;
  --orange:  #FF6B2B;
  --teal:    #00C2A8;
  --ink:     #0D0D0D;
  --paper:   #F5F0E8;
  --white:   #FFFFFF;
  --mid:     #2A2A2A;
  --muted:   rgba(13,13,13,0.45);

  /* tier accent map */
  --t1: var(--yellow);
  --t2: var(--orange);
  --t3: var(--teal);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: rgba(13,13,13,0.2); border-radius:3px; }

/* ═══════════════════════════════
   HERO / NAV BAR
═══════════════════════════════ */
.topbar {
  background: var(--ink);
  padding: 0 40px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2px solid rgba(255,224,64,0.2);
}
.topbar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 2px; color: var(--paper);
}
.topbar-logo span { color: var(--yellow); }
.topbar-nav { display:flex; gap:6px; }
.topbar-btn {
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 6px 16px;
  border: 1px solid rgba(255,255,255,0.15); background: transparent;
  color: rgba(245,240,232,0.5); cursor: pointer; transition: all .2s;
  border-radius: 2px;
}
.topbar-btn:hover, .topbar-btn.active {
  border-color: var(--yellow); color: var(--yellow);
  background: rgba(255,224,64,0.06);
}
.topbar-btn.admin { border-color: rgba(0,194,168,0.4); color: var(--teal); }
.topbar-btn.admin:hover { background: rgba(0,194,168,0.08); }

/* ─── HERO ─── */
.hero {
  background: var(--ink);
  padding: 52px 40px 48px;
  position: relative; overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 20px,
    rgba(255,224,64,0.03) 20px, rgba(255,224,64,0.03) 21px
  );
}
.hero-inner { position: relative; max-width: 1080px; margin: 0 auto; }
.hero-eyebrow {
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--yellow); margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
}
.hero-eyebrow::after { content:''; height:1px; flex:1; background: rgba(255,224,64,0.2); }

.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(60px,10vw,108px);
  line-height: 0.9; letter-spacing: 1px;
  color: var(--paper);
}
.hero h1 em { font-style:normal; color: var(--yellow); display:block; }

.hero-sub {
  margin-top: 22px; max-width: 480px;
  font-family: 'Space Mono', monospace; font-size: 12px;
  line-height: 1.8; color: rgba(245,240,232,0.45);
}

/* tier pills */
.hero-pills { display:flex; gap:10px; margin-top: 32px; flex-wrap:wrap; }
.pill {
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 8px 22px;
  border: 1.5px solid; cursor: pointer; transition: all .2s;
  user-select: none;
}
.pill[data-tier="all"]  { border-color: rgba(245,240,232,0.3); color: rgba(245,240,232,0.5); }
.pill[data-tier="1"]    { border-color: rgba(255,224,64,0.5); color: var(--yellow); }
.pill[data-tier="2"]    { border-color: rgba(255,107,43,0.5); color: var(--orange); }
.pill[data-tier="3"]    { border-color: rgba(0,194,168,0.5); color: var(--teal); }
.pill[data-tier="all"].active, .pill[data-tier="all"]:hover  { background:var(--paper); color:var(--ink); border-color:var(--paper); }
.pill[data-tier="1"].active, .pill[data-tier="1"]:hover      { background:var(--yellow); color:var(--ink); border-color:var(--yellow); }
.pill[data-tier="2"].active, .pill[data-tier="2"]:hover      { background:var(--orange); color:var(--white); border-color:var(--orange); }
.pill[data-tier="3"].active, .pill[data-tier="3"]:hover      { background:var(--teal); color:var(--ink); border-color:var(--teal); }

/* big ghost number */
.hero-ghost {
  position:absolute; right:-10px; top:-20px;
  font-family:'Bebas Neue',sans-serif; font-size:180px; line-height:1;
  color: rgba(255,224,64,0.05); pointer-events:none; user-select:none;
}

/* ═══════════════════════════════
   DOMAIN FILTER TAPE
═══════════════════════════════ */
.domain-tape {
  background: var(--white);
  border-bottom: 2px solid var(--ink);
  padding: 12px 40px;
  display: flex; gap: 8px; flex-wrap: wrap;
  max-width: 100%;
  position: sticky; top: 52px; z-index: 90;
}
.domain-chip {
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px;
  padding: 5px 14px; border: 1.5px solid rgba(13,13,13,0.15);
  color: var(--muted); cursor: pointer; transition: all .2s;
  background: transparent;
}
.domain-chip:hover { border-color: var(--ink); color: var(--ink); }
.domain-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ═══════════════════════════════
   TIER SECTIONS
═══════════════════════════════ */
#main-view { display:block; }
#main-view.hidden { display:none; }

.tier-section { padding: 48px 40px 20px; max-width: 1080px; margin: 0 auto; }

.tier-header {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 28px; padding-bottom: 18px;
  border-bottom: 2px solid var(--ink);
}
.tier-badge {
  font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px;
  padding: 5px 14px; border: 2px solid;
}
.t1 .tier-badge { border-color:var(--yellow); color:var(--yellow); background:rgba(255,224,64,0.08); }
.t2 .tier-badge { border-color:var(--orange); color:var(--orange); background:rgba(255,107,43,0.08); }
.t3 .tier-badge { border-color:var(--teal);   color:var(--teal);   background:rgba(0,194,168,0.08); }

.tier-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px;
}
.tier-sub {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--muted); margin-left: auto;
}

/* ═══════════════════════════════
   CHALLENGE GRID & CARDS
═══════════════════════════════ */
.challenge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 0;
  border: 2px solid var(--ink);
}

.card {
  border-right: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
  background: var(--white);
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: background .15s;
  position: relative;
  overflow: hidden;
}
.card:hover { background: var(--paper); }
/* accent stripe on hover */
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  transform: scaleX(0); transform-origin: left;
  transition: transform .25s;
}
.t1 .card::before { background: var(--yellow); }
.t2 .card::before { background: var(--orange); }
.t3 .card::before { background: var(--teal); }
.card:hover::before { transform: scaleX(1); }

.card-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(13,13,13,0.08);
  display: flex; align-items: flex-start; justify-content: space-between; gap:10px;
}
.card-domain {
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 10px; border: 1px solid;
}
.t1 .card-domain { border-color:var(--yellow); color:rgba(13,13,13,0.6); background:rgba(255,224,64,0.12); }
.t2 .card-domain { border-color:var(--orange); color:rgba(13,13,13,0.6); background:rgba(255,107,43,0.10); }
.t3 .card-domain { border-color:var(--teal);   color:rgba(13,13,13,0.6); background:rgba(0,194,168,0.10); }

.card-time {
  font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap;
}

.card-body { padding: 16px 20px; flex:1; }
.card-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.5px;
  line-height: 1.05; margin-bottom: 8px;
}
.card-mystery {
  font-family: 'Space Mono', monospace; font-size: 11px; font-style:italic;
  color: var(--muted); line-height: 1.65; margin-bottom: 14px;
}

.card-levels { display:flex; flex-direction:column; gap:6px; }
.level-row {
  display:flex; align-items:center; gap:10px;
  padding: 7px 10px;
  background: rgba(13,13,13,0.03);
  border: 1px solid rgba(13,13,13,0.07);
}
.level-num {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px;
  color: var(--muted); min-width:34px;
}
.level-title { font-size:12px; color:var(--mid); }

.card-foot {
  padding: 12px 20px;
  border-top: 1px solid rgba(13,13,13,0.08);
  display:flex; gap:8px;
}
.btn-card {
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.5px;
  padding: 7px 14px; border: 1.5px solid var(--ink);
  background:transparent; color:var(--ink); cursor:pointer;
  transition: all .15s; flex:1; text-align:center;
}
.btn-card:hover { background:var(--ink); color:var(--paper); }
.btn-dl {
  border-color: var(--muted); color:var(--muted);
}
.t1 .btn-dl:hover { background:var(--yellow); border-color:var(--yellow); color:var(--ink); }
.t2 .btn-dl:hover { background:var(--orange); border-color:var(--orange); color:var(--white); }
.t3 .btn-dl:hover { background:var(--teal);   border-color:var(--teal);   color:var(--ink); }

/* ═══════════════════════════════
   SCROLLING TAPE DIVIDER
═══════════════════════════════ */
.tape-divider {
  height: 30px; background:var(--ink);
  display:flex; align-items:center; overflow:hidden;
  margin: 40px 0 0;
}
.tape-scroll {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:4px;
  text-transform:uppercase; color:rgba(245,240,232,0.18);
  white-space:nowrap; animation: tapescroll 22s linear infinite;
}
@keyframes tapescroll {
  from { transform:translateX(0); }
  to   { transform:translateX(-50%); }
}

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(13,13,13,0.75);
  backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.overlay.open { display:flex; }

.modal {
  background:var(--paper); border:2px solid var(--ink);
  width:100%; max-width:680px; max-height:90vh; overflow-y:auto;
  position:relative; animation:modalPop .22s ease;
}
@keyframes modalPop { from { opacity:0; transform:scale(.97) translateY(8px); } }

.modal-header {
  padding: 28px 32px 22px;
  border-bottom: 2px solid var(--ink);
  position:sticky; top:0; background:var(--paper); z-index:1;
  display:flex; align-items:flex-start; justify-content:space-between;
}
.modal-close {
  background:none; border:1.5px solid var(--ink); color:var(--ink);
  width:30px; height:30px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-left:16px; transition:all .2s;
}
.modal-close:hover { background:var(--ink); color:var(--paper); }

.m-tags { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.m-tag {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; padding:3px 10px; border:1.5px solid;
}
.m-title {
  font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:0.5px; line-height:1;
}
.m-mystery {
  margin-top:6px; font-family:'Space Mono',monospace; font-size:11px;
  font-style:italic; color:var(--muted); line-height:1.6;
}

/* modal body sections */
.modal-body { padding:28px 32px 8px; }
.ms { margin-bottom:26px; }
.ms-label {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px;
  text-transform:uppercase; color:var(--muted);
  display:flex; align-items:center; gap:12px; margin-bottom:10px;
}
.ms-label::after { content:''; flex:1; height:1px; background:rgba(13,13,13,0.12); }

.ms p { font-size:14px; line-height:1.8; color:var(--mid); }
.ms strong { color:var(--ink); }

.step-list { display:flex; flex-direction:column; gap:12px; }
.m-step { display:flex; gap:14px; align-items:flex-start; }
.m-sn {
  width:26px; height:26px; border-radius:50%; border:1.5px solid;
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Mono',monospace; font-size:10px; font-weight:700;
  flex-shrink:0; margin-top:1px;
}
.t1c { border-color:var(--yellow); color:var(--ink); background:rgba(255,224,64,0.2); }
.t2c { border-color:var(--orange); color:var(--orange); }
.t3c { border-color:var(--teal);   color:var(--teal); }
.m-step p { font-size:14px; line-height:1.75; color:var(--mid); }

.loot-wrap { display:flex; flex-wrap:wrap; gap:7px; }
.loot-tag {
  font-family:'Space Mono',monospace; font-size:10px; padding:4px 12px;
  border:1.5px solid rgba(13,13,13,0.15); color:var(--mid);
  background:var(--white);
}

.success-box {
  padding:16px 20px; border:2px solid var(--ink);
  background:var(--white);
}
.success-box p { font-size:14px; line-height:1.75; color:var(--mid); }

.intuition-box {
  padding:16px 20px; border-left:4px solid;
  background:var(--white);
}
.t1 .intuition-box, .mt1 { border-color:var(--yellow) !important; }
.t2 .intuition-box, .mt2 { border-color:var(--orange) !important; }
.t3 .intuition-box, .mt3 { border-color:var(--teal)   !important; }
.intuition-box p { font-size:14px; line-height:1.75; color:var(--mid); }

/* modal split outcomes row */
.modal-outcomes {
  display:grid; grid-template-columns:1fr 1fr;
  border-top: 2px solid var(--ink);
}
.outcome-cell { padding:20px 28px; }
.outcome-cell:first-child { border-right:2px solid var(--ink); }
.outcome-label {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted); margin-bottom:8px;
}
.outcome-text { font-size:13px; line-height:1.7; color:var(--mid); }

.modal-footer {
  padding:18px 32px; border-top:2px solid var(--ink);
  display:flex; gap:10px; background:var(--paper);
  position:sticky; bottom:0;
}
.btn-modal {
  flex:1; padding:11px; border:2px solid var(--ink);
  font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:all .2s;
  background:transparent;
}
.btn-modal-dl { background:var(--ink); color:var(--paper); }
.btn-modal-dl:hover { opacity:.85; }
.btn-modal-cl { color:var(--muted); border-color:rgba(13,13,13,0.2); }
.btn-modal-cl:hover { border-color:var(--ink); color:var(--ink); }

/* ═══════════════════════════════
   ADMIN PANEL
═══════════════════════════════ */
#admin-view {
  display:none; max-width:1080px; margin:0 auto; padding:40px;
}
#admin-view.open { display:block; }

.admin-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:32px; padding-bottom:20px; border-bottom:2px solid var(--ink);
}
.admin-title {
  font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:1px;
}
.admin-title span { color:var(--teal); }

.admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
@media(max-width:700px) { .admin-grid { grid-template-columns:1fr; } }

.admin-card {
  background:var(--white); border:2px solid var(--ink); padding:28px;
}
.admin-card h3 {
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px;
  margin-bottom:20px;
}
.t3color { color:var(--teal); }

.fg { margin-bottom:14px; }
.fl {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted); display:block; margin-bottom:5px;
}
.fi, .fs, .ft {
  width:100%; background:var(--paper); border:1.5px solid rgba(13,13,13,0.2);
  color:var(--ink); font-family:'Space Mono',monospace; font-size:11px;
  padding:9px 12px; outline:none; transition:border-color .2s;
  font-family:'DM Sans',sans-serif;
}
.fi:focus, .fs:focus, .ft:focus { border-color:var(--teal); }
.ft { min-height:80px; resize:vertical; }
.fs option { background:var(--paper); }

.btn-admin-add {
  width:100%; padding:12px; border:2px solid var(--ink);
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px;
  background:var(--ink); color:var(--paper); cursor:pointer;
  transition:all .2s; margin-top:8px;
}
.btn-admin-add:hover { background:var(--teal); border-color:var(--teal); color:var(--ink); }

.admin-list { display:flex; flex-direction:column; gap:2px; }
.admin-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; background:var(--paper);
  border:1.5px solid rgba(13,13,13,0.1);
}
.admin-item-name { font-weight:500; font-size:13px; }
.admin-item-meta {
  font-family:'Space Mono',monospace; font-size:9px;
  color:var(--muted); margin-top:2px;
}
.btn-del {
  background:none; border:1.5px solid rgba(255,107,43,0.35);
  color:var(--orange); padding:4px 12px; cursor:pointer;
  font-family:'Space Mono',monospace; font-size:9px;
  transition:all .2s; flex-shrink:0; margin-left:12px;
}
.btn-del:hover { background:var(--orange); color:var(--white); border-color:var(--orange); }

/* toast */
.toast {
  position:fixed; bottom:32px; right:32px; z-index:999;
  background:var(--ink); color:var(--yellow);
  padding:12px 24px; border:2px solid var(--yellow);
  font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1px;
  opacity:0; transform:translateY(8px);
  transition:all .3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }

/* ─── RESPONSIVE ─── */
@media(max-width:640px) {
  .hero { padding: 40px 20px 36px; }
  .topbar { padding:0 16px; }
  .tier-section { padding:36px 20px 16px; }
  .domain-tape { padding:10px 20px; }
  .modal-header, .modal-body, .modal-footer { padding-left:20px; padding-right:20px; }
  .modal-outcomes { grid-template-columns:1fr; }
  .modal-outcomes .outcome-cell:first-child { border-right:none; border-bottom:2px solid var(--ink); }
  .admin-grid { grid-template-columns:1fr; }
  #admin-view { padding:20px; }
}
</style>
</head>
<body>

<!-- ──── TOPBAR ──── -->
<nav class="topbar">
  <div class="topbar-logo">Maker<span>Path</span></div>
  <div class="topbar-nav">
    <button class="topbar-btn active" id="btn-challenges" onclick="showMain()">Challenges</button>
    <button class="topbar-btn admin" onclick="showAdmin()">⚙ Admin</button>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════
     MAIN VIEW
══════════════════════════════════════════ -->
<div id="main-view">

  <!-- HERO -->
  <header class="hero">
    <div class="hero-ghost" id="ghost-num">13</div>
    <div class="hero-inner" style="max-width:1080px;margin:0 auto;position:relative;">
      <p class="hero-eyebrow">MakerPath · Challenge Platform</p>
      <h1>BUILD.<em>SOLVE.</em>ARCHITECT.</h1>
      <p class="hero-sub">Three tiers. Ten domains. Hands-on challenges from your first LED to portfolio-grade systems — no textbooks, just making.</p>
      <div class="hero-pills">
        <div class="pill active" data-tier="all"  onclick="filterTier('all',this)">All Tiers</div>
        <div class="pill"        data-tier="1"    onclick="filterTier('1',this)">T1 · Explorer</div>
        <div class="pill"        data-tier="2"    onclick="filterTier('2',this)">T2 · Solver</div>
        <div class="pill"        data-tier="3"    onclick="filterTier('3',this)">T3 · Architect</div>
      </div>
    </div>
  </header>

  <!-- DOMAIN FILTER -->
  <div class="domain-tape" id="domain-tape"></div>

  <!-- TIERS CONTAINER -->
  <div id="tiers-container"></div>

</div><!-- /main-view -->

<!-- ══════════════════════════════════════════
     ADMIN VIEW
══════════════════════════════════════════ -->
<div id="admin-view">

let activeTier   = "all";
let activeDomain = "all";

// ══════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════
function getDomains() {
  return ["all", ...Array.from(new Set(challenges.map(c=>c.domain))).sort()];
}

function renderDomainTape() {
  document.getElementById("domain-tape").innerHTML =
    getDomains().map(d =>
      `<div class="domain-chip ${d===activeDomain?'active':''}" onclick="filterDomain('${d}',this)">${d==='all'?'All Domains':d}</div>`
    ).join('');
}

function renderAll() {
  updateGhost();
  renderDomainTape();
  const container = document.getElementById("tiers-container");
  container.innerHTML = "";
  ["1","2","3"].forEach(tier => {
    const info = TIERS[tier];
    const list = challenges.filter(c =>
      (activeTier==="all" || c.tier===activeTier) &&
      (activeDomain==="all" || c.domain===activeDomain) &&
      c.tier===tier
    );
    if (!list.length) return;

    const sec = document.createElement("div");
    sec.innerHTML = `
      <div class="tier-section">
        <div class="tier-header ${info.cls}">
          <span class="tier-badge">${info.label}</span>
          <span class="tier-name">${tierFullName(tier)}</span>
          <span class="tier-sub">${info.sub}</span>
        </div>
        <div class="challenge-grid ${info.cls}">
          ${list.map(c=>cardHTML(c,info)).join('')}
        </div>
      </div>
      ${tier!=="3" ? tapeDivider(tier) : ""}
    `;
    container.appendChild(sec);
  });
}

function tierFullName(t) {
  return {
    "1":"Explorer Challenges — Fundamental Learning",
    "2":"Solver Challenges — Structured Problem Solving",
    "3":"Architect Challenges — Deep Tech & Creation"
  }[t];
}

function tapeDivider(tier) {
  const words = {
    "1":"CONDUCTORS · INSULATORS · RESISTANCE · PATTERN RECOGNITION · TILT SENSING · BINARY COMMS · ",
    "2":"MAZE NAVIGATION · SENSOR FUSION · TOLERANCE ENGINEERING · BIAS AUDITING · ITERATION · ",
  }[tier] || "";
  return `<div class="tape-divider"><div class="tape-scroll">${words.repeat(6)}</div></div>`;
}

function cardHTML(c, info) {
  return `
    <div class="card" onclick="openModal(${c.id})">
      <div class="card-head">
        <span class="card-domain">${c.domain}</span>
        <span class="card-time">⏱ ${c.time}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${c.title}</div>
        <div class="card-mystery">"${c.mystery}"</div>
        <div class="card-levels">
          ${(c.levels||[]).slice(0,3).map((l,i)=>`
            <div class="level-row">
              <span class="level-num">LVL ${i+1}</span>
              <span class="level-title">${l}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="card-foot">
        <button class="btn-card" onclick="event.stopPropagation();openModal(${c.id})">View Details</button>
        <button class="btn-card btn-dl" onclick="event.stopPropagation();downloadChallenge(${c.id})">⬇ Download</button>
      </div>
    </div>`;
}

function updateGhost() {
  const vis = challenges.filter(c =>
    (activeTier==="all" || c.tier===activeTier) &&
    (activeDomain==="all" || c.domain===activeDomain)
  ).length;
  document.getElementById("ghost-num").textContent = String(vis).padStart(2,"0");
}

// ══════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════
function filterTier(tier, el) {
  activeTier = tier;
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  renderAll();
}
function filterDomain(domain, el) {
  activeDomain = domain;
  document.querySelectorAll(".domain-chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  renderAll();
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function openModal(id) {
  const c = challenges.find(x=>x.id===id);
  const info = TIERS[c.tier];

  // tags
  const tagStyle = {
    "1":`border-color:var(--yellow);color:var(--ink);background:rgba(255,224,64,0.15)`,
    "2":`border-color:var(--orange);color:var(--orange)`,
    "3":`border-color:var(--teal);color:var(--teal)`
  }[c.tier];
  document.getElementById("m-tags").innerHTML = `
    <span class="m-tag" style="${tagStyle}">${info.label}</span>
    <span class="m-tag" style="border-color:rgba(13,13,13,0.2);color:var(--muted)">${c.domain}</span>
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">⏱ ${c.time}</span>
  `;
  document.getElementById("m-title").textContent = c.title;
  document.getElementById("m-mystery").textContent = `"${c.mystery}"`;

  // body
  document.getElementById("m-body").innerHTML = `
    <div class="ms">
      <div class="ms-label">Mission</div>
      <p>${c.mission}</p>
    </div>
    <div class="ms">
      <div class="ms-label">Steps</div>
      <div class="step-list">
        ${c.steps.map((s,i)=>`
          <div class="m-step">
            <div class="m-sn ${info.stepCls}">${i+1}</div>
            <p>${s}</p>
          </div>`).join('')}
      </div>
    </div>
    <div class="ms">
      <div class="ms-label">The Loot · Materials</div>
      <div class="loot-wrap">${c.loot.map(l=>`<span class="loot-tag">${l}</span>`).join('')}</div>
    </div>
    <div class="ms">
      <div class="ms-label">Maker's Intuition</div>
      <div class="intuition-box m${info.cls}"><p>💡 ${c.intuition}</p></div>
    </div>
  `;

  // outcomes
  document.getElementById("m-outcomes").innerHTML = `
    <div class="outcome-cell">
      <div class="outcome-label">🏆 Success Goal</div>
      <div class="outcome-text">${c.success}</div>
    </div>
    <div class="outcome-cell">
      <div class="outcome-label">📈 Skills Unlocked</div>
      <div class="outcome-text">${(c.levels||[]).map((l,i)=>`<div style="margin-bottom:4px">✓ ${l}</div>`).join('')}</div>
    </div>
  `;

  document.getElementById("m-dl").onclick = () => downloadChallenge(id);
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeOverlay(e) { if(e.target===document.getElementById("overlay")) closeModal(); }
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ══════════════════════════════════════════
//  DOWNLOAD
// ══════════════════════════════════════════
function downloadChallenge(id) {
  const c = challenges.find(x=>x.id===id);
  const col = {"1":"#FFE040","2":"#FF6B2B","3":"#00C2A8"}[c.tier];
  const tname = {"1":"T1 · Explorer","2":"T2 · Solver","3":"T3 · Architect"}[c.tier];

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>${c.title}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#F5F0E8; color:#0D0D0D; padding:52px; max-width:760px; margin:0 auto; }
.badge { display:inline-block; border:1.5px solid ${col}; color:#0D0D0D; background:${col}33;
  padding:4px 14px; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; margin-bottom:16px; }
h1 { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:1px; line-height:1; margin-bottom:6px; }
.mystery { font-family:'Space Mono',monospace; font-size:12px; font-style:italic; color:rgba(13,13,13,0.5);
  margin-bottom:28px; padding-bottom:24px; border-bottom:2px solid #0D0D0D; }
.sl { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(13,13,13,0.4); margin-top:24px; margin-bottom:10px;
  display:flex; align-items:center; gap:10px; }
.sl::after { content:''; flex:1; height:1px; background:rgba(13,13,13,0.12); }
p, .st { font-size:14px; line-height:1.8; color:#2A2A2A; }
.step { display:flex; gap:12px; margin-bottom:10px; align-items:flex-start; }
.sn { width:24px; height:24px; border-radius:50%; background:${col}; border:1.5px solid #0D0D0D;
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Mono',monospace; font-size:10px; font-weight:700; flex-shrink:0; }
.loot-wrap { display:flex; flex-wrap:wrap; gap:7px; }
.lt { font-family:'Space Mono',monospace; font-size:10px; padding:4px 12px;
  border:1.5px solid rgba(13,13,13,0.15); color:#2A2A2A; background:#fff; }
.sbox { padding:14px 18px; border:2px solid #0D0D0D; background:#fff; margin-top:8px; }
.ibox { padding:14px 18px; border-left:4px solid ${col}; background:#fff; margin-top:8px; }
.outcomes { display:grid; grid-template-columns:1fr 1fr; gap:0; border-top:2px solid #0D0D0D; margin-top:28px; }
.oc { padding:18px; }
.oc:first-child { border-right:2px solid #0D0D0D; }
.ol { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(13,13,13,0.4); margin-bottom:8px; }
.ot { font-size:13px; line-height:1.7; color:#2A2A2A; }
.footer { margin-top:36px; padding-top:16px; border-top:1px solid rgba(13,13,13,0.15);
  font-family:'Space Mono',monospace; font-size:9px; color:rgba(13,13,13,0.3);
  display:flex; justify-content:space-between; }

</style></head><body>
<div class="badge">${tname} · ${c.domain} · ${c.time}</div>
<h1>${c.title}</h1>
<div class="mystery">"${c.mystery}"</div>

<div class="sl">Mission</div>
<p>${c.mission}</p>

<div class="sl">Steps</div>
${c.steps.map((s,i)=>`<div class="step"><div class="sn">${i+1}</div><p>${s}</p></div>`).join('')}

<div class="sl">The Loot · Materials</div>
<div class="loot-wrap">${c.loot.map(l=>`<span class="lt">${l}</span>`).join('')}</div>

<div class="sl">Maker's Intuition</div>
<div class="ibox"><p>💡 ${c.intuition}</p></div>

<div class="outcomes">
  <div class="oc"><div class="ol">🏆 Success Goal</div><div class="ot">${c.success}</div></div>
  <div class="oc"><div class="ol">📈 Levels</div><div class="ot">${(c.levels||[]).map(l=>`✓ ${l}<br>`).join('')}</div></div>

  <span>MakerPath Challenge Platform</span>
  <span>${c.title} · Printed ${new Date().toLocaleDateString()}</span>

  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();

// ══════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════
function showAdmin() {
  document.getElementById("main-view").classList.add("hidden");
  document.getElementById("admin-view").classList.add("open");
  document.getElementById("btn-challenges").classList.remove("active");
  renderAdminList();
}
function showMain() {
  document.getElementById("main-view").classList.remove("hidden");
  document.getElementById("admin-view").classList.remove("open");
  document.getElementById("btn-challenges").classList.add("active");
  renderAll();
}

function renderAdminList() {
  const el = document.getElementById("admin-list");
  if (!challenges.length) {
    el.innerHTML = `<p style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">No challenges yet.</p>`;
    return;
  }
  el.innerHTML = challenges.map(c => `
    <div class="admin-item">
      <div style="flex:1">
        <div class="admin-item-name">${c.title}</div>
        <div class="admin-item-meta">${TIERS[c.tier].label} · ${c.domain} · ${c.time}</div>
      </div>
      <button class="btn-del" onclick="deleteChallenge(${c.id})">✕ Remove</button>
    </div>`).join('');
}

function addChallenge() {
  const title     = document.getElementById("a-title").value.trim();
  const mystery   = document.getElementById("a-mystery").value.trim();
  const domain    = document.getElementById("a-domain").value;
  const tier      = document.getElementById("a-tier").value;
  const time      = document.getElementById("a-time").value.trim() || "60 min";
  const mission   = document.getElementById("a-mission").value.trim();
  const lootRaw   = document.getElementById("a-loot").value.trim();
  const success   = document.getElementById("a-success").value.trim();
  const intuition = document.getElementById("a-intuition").value.trim();

  if (!title || !mystery || !mission) { showToast("Fill in Title, Mystery, and Mission at minimum."); return; }

  challenges.push({
    id: Date.now(), tier, domain, time, title, mystery, mission,
    steps: [mission],
    loot: lootRaw ? lootRaw.split(',').map(s=>s.trim()) : [],
    success: success || "Complete the mission and document your process.",
    intuition: intuition || "This concept powers real-world systems.",
    levels: ["L1 · Core Challenge"]
  });

  ["a-title","a-mystery","a-time","a-mission","a-loot","a-success","a-intuition"]
    .forEach(id => document.getElementById(id).value = "");
  renderAdminList();
  showToast("✓ Challenge added!");
}

function deleteChallenge(id) {
  challenges = challenges.filter(c=>c.id!==id);
  renderAdminList();
  showToast("Challenge removed.");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderAll();
</script>
</body>
</html>
