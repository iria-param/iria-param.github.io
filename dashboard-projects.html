<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .project-panel{border:2px solid var(--ink);box-shadow:var(--shadow);margin-bottom:1.5rem;}
    .pp-head{background:var(--ink);color:var(--paper);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;border-bottom:3px solid var(--orange);}
    .pp-body{padding:1.25rem;}
    .update-row{padding:.75rem 0;border-bottom:1px solid var(--grey);}
    .update-row:last-child{border-bottom:none;}
    .add-update-form{background:var(--grey-light);border:1px solid var(--grey);padding:1rem;margin-top:1rem;}
    .update-type-badge{font-size:.65rem;font-weight:700;padding:.15rem .4rem;font-family:var(--font-mono);}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// projects + project_members + project_updates</div>
      <div class="flex-between" style="flex-wrap:wrap;gap:.75rem;">
        <h1>My Projects</h1>
        <a href="projects.html" class="btn btn-primary btn-sm">Browse Projects →</a>
      </div>
    </div>
    <div id="projectsContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let currentUser;

onReady(async () => {
  try {
    await renderNav();
    currentUser = await Auth.requireAuth('auth.html');
    if (!currentUser) return;
    const { data: prof } = await db.from('maker_profiles').select('*').eq('user_id', currentUser.id).single();
    renderSidebar('projects', prof, currentUser);
    await loadProjects();
  } catch(e) {
    $('projectsContent').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
});

async function loadProjects() {
  const { data: members, error } = await db
    .from('project_members')
    .select('team_role, is_lead, projects(*, project_members(user_id,team_role,is_lead,joined_at,maker_profiles(full_name)), project_updates(id,title,update_type,body,visibility,created_at))')
    .eq('user_id', currentUser.id);

  if (error) { $('projectsContent').innerHTML=`<div class="alert alert-error">${error.message}</div>`; return; }
  const projects = (members||[]).map(m => ({ ...m.projects, myRole: m.team_role, isLead: m.is_lead })).filter(Boolean);

  if (!projects.length) {
    $('projectsContent').innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔧</div><h3>No projects yet</h3>
      <p>Propose a project or join an existing one.</p>
      <a href="projects.html" class="btn btn-primary btn-sm mt-2">Browse Projects →</a>
    </div>`;
    return;
  }

  $('projectsContent').innerHTML = projects.map(p => {
    const updates = (p.project_updates || []).sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
    const team = p.project_members || [];
    const isLead = p.isLead || p.lead_user_id === currentUser.id;
    const typeColors = { progress:'badge-teal', milestone:'badge-green', issue:'badge-orange', general:'badge-grey' };

    return `<div class="project-panel">
      <div class="pp-head">
        <div>
          <div class="flex-wrap gap-sm mb-1">
            ${statusBadge(p.status)}
            ${p.approval_status ? `<span class="badge badge-grey">${p.approval_status}</span>` : ''}
            ${p.visibility ? `<span class="badge badge-${p.visibility==='public'?'teal':'grey'}">${p.visibility}</span>` : ''}
            ${p.showcase_flag ? '<span class="badge badge-orange">Showcase</span>' : ''}
            ${isLead ? '<span class="badge badge-yellow">Lead</span>' : ''}
          </div>
          <div style="font-weight:800;font-size:1.05rem;">${p.title}</div>
          ${p.tags?.length ? `<div class="mono text-xs" style="opacity:.5;margin-top:.2rem;">${p.tags.join(' · ')}</div>` : ''}
        </div>
        ${isLead ? `<div style="display:flex;gap:.5rem;flex-wrap:wrap;">
          ${p.status==='draft'?`<button class="btn btn-sm btn-teal" onclick="updateStatus('${p.id}','active')">Mark Active</button>`:''}
          ${p.status==='active'?`<button class="btn btn-sm btn-green" onclick="updateStatus('${p.id}','completed')">Mark Complete</button>`:''}
          <button class="btn btn-sm btn-ghost" onclick="toggleVisibility('${p.id}','${p.visibility}')">Toggle Visibility</button>
        </div>` : ''}
      </div>
      <div class="pp-body">
        ${p.summary ? `<p class="text-sm text-grey mb-3">${p.summary}</p>` : ''}

        <!-- Updates -->
        <div class="flex-between mb-2">
          <h4 class="text-sm">Project Updates (${updates.length})</h4>
          <button class="btn btn-sm btn-ghost" onclick="toggleAddUpdate('add-upd-${p.id}')">+ Post Update</button>
        </div>
        <div id="upd-list-${p.id}">
          ${updates.length===0 ? '<p class="text-sm text-grey">No updates posted yet.</p>' :
            updates.slice(0,3).map(u => `<div class="update-row">
              <div class="flex-between mb-1">
                <span class="update-type-badge badge badge-${typeColors[u.update_type]||'grey'}">${u.update_type||'update'}</span>
                <span class="mono text-xs text-grey">${formatDate(u.created_at)}</span>
              </div>
              ${u.title?`<div class="bold text-sm">${u.title}</div>`:''}
              ${u.body?`<div class="text-sm text-grey mt-1">${u.body}</div>`:''}
            </div>`).join('')}
          ${updates.length>3?`<div class="text-xs text-grey mt-2">${updates.length-3} more update${updates.length-3!==1?'s':''} not shown</div>`:''}
        </div>

        <div id="add-upd-${p.id}" class="add-update-form hidden">
          <div class="form-row">
            <div class="form-group" style="margin:0;">
              <label class="form-label form-required">Title</label>
              <input type="text" id="upd-title-${p.id}" class="form-input" placeholder="Update title"></div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Type</label>
              <select id="upd-type-${p.id}" class="form-input">
                <option value="general">General</option>
                <option value="progress">Progress</option>
                <option value="milestone">Milestone</option>
                <option value="issue">Issue</option>
              </select></div>
          </div>
          <div class="form-group">
            <label class="form-label">Body</label>
            <textarea id="upd-body-${p.id}" class="form-input" rows="2" placeholder="Describe the update…"></textarea></div>
          <div style="display:flex;gap:.5rem;">
            <button class="btn btn-teal btn-sm" onclick="postUpdate('${p.id}')">Post →</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleAddUpdate('add-upd-${p.id}')">Cancel</button>
          </div>
        </div>

        <!-- Team -->
        <div class="divider-thin mt-3"></div>
        <div class="flex-wrap gap-sm mt-2">
          <span class="mono text-xs text-grey">Team:</span>
          ${team.map(m=>`<span class="chip ${m.is_lead?'chip-yellow':''}">${m.maker_profiles?.full_name||'Member'}
            <span class="badge badge-grey" style="font-size:.58rem;">${m.team_role||'member'}</span>
          </span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleAddUpdate(id) { const el=$(id); el.classList.toggle('hidden'); }

async function postUpdate(projectId) {
  const title = $(`upd-title-${projectId}`).value.trim();
  if (!title) return;
  const { error } = await db.from('project_updates').insert({
    project_id: projectId,
    title,
    update_type: $(`upd-type-${projectId}`).value,
    body: $(`upd-body-${projectId}`).value.trim() || null,
    visibility: 'public',
    created_by: currentUser.id,
  });
  if (error) { alert(error.message); return; }
  await loadProjects();
}

async function updateStatus(projectId, status) {
  await db.from('projects').update({ status }).eq('id', projectId);
  await loadProjects();
}

async function toggleVisibility(projectId, current) {
  await db.from('projects').update({ visibility: current==='public' ? 'private' : 'public' }).eq('id', projectId);
  await loadProjects();
}
</script>
</body>
</html>
