<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .profile-avatar-box{width:80px;height:80px;background:var(--orange);border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;flex-shrink:0;}
    .tag-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
    .tag-item{background:var(--grey-light);border:1px solid var(--grey);padding:.25rem .6rem;font-size:.75rem;font-family:var(--font-mono);display:flex;align-items:center;gap:.35rem;}
    .tag-rm{cursor:pointer;color:var(--grey-dark);font-size:.9rem;}
    .tag-rm:hover{color:var(--red);}
    .tag-input-row{display:flex;gap:.5rem;margin-top:.5rem;}
    .section-card{background:var(--paper);border:2px solid var(--ink);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.5rem;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// maker_profiles</div>
      <h1>Edit Profile</h1>
    </div>
    <div id="profileContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let currentUser, profileData;

onReady(async () => {
  try {
    await renderNav();
    currentUser = await Auth.requireAuth('auth.html');
    if (!currentUser) return;
    const { data: prof } = await db.from('maker_profiles').select('*').eq('user_id', currentUser.id).single();
    profileData = prof || {};
    renderSidebar('profile', prof, currentUser);
    renderForm();
  } catch(e) {
    $('profileContent').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
});

function renderForm() {
  const p = profileData;
  $('profileContent').innerHTML = `
    <div class="section-card">
      <h3 class="mb-4">Basic Info</h3>
      <div style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;margin-bottom:1.25rem;">
        <div class="profile-avatar-box">${getInitials(p.full_name || currentUser.email)}</div>
        <div style="flex:1;min-width:200px;">
          <div class="form-group" style="margin:0 0 .75rem;">
            <label class="form-label form-required">Full Name</label>
            <input id="f-name" class="form-input" value="${p.full_name||''}" placeholder="Your full name">
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Profile Photo URL</label>
            <input id="f-photo" class="form-input" value="${p.profile_photo_url||''}" placeholder="https://...">
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Profile Slug</label>
          <input id="f-slug" class="form-input" value="${p.slug||''}" placeholder="your-handle"></div>
        <div class="form-group"><label class="form-label">Headline</label>
          <input id="f-headline" class="form-input" value="${p.headline||''}" placeholder="e.g. Electronics tinkerer"></div>
      </div>
      <div class="form-group"><label class="form-label">Bio</label>
        <textarea id="f-bio" class="form-input" rows="3" placeholder="About yourself as a maker">${p.bio||''}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">City</label>
          <input id="f-city" class="form-input" value="${p.city||''}" placeholder="Bengaluru"></div>
        <div class="form-group"><label class="form-label">Institution</label>
          <input id="f-institution" class="form-input" value="${p.institution||''}" placeholder="College / Company"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Role Type</label>
          <select id="f-role" class="form-input">
            <option value="">Select…</option>
            ${['student','hobbyist','professional','researcher','educator'].map(r=>
              `<option value="${r}" ${p.role_type===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`
            ).join('')}
          </select></div>
        <div class="form-group"><label class="form-label">Profile Visibility</label>
          <select id="f-pubvis" class="form-input">
            <option value="public" ${p.public_visibility==='public'?'selected':''}>Public</option>
            <option value="members" ${p.public_visibility==='members'?'selected':''}>Members Only</option>
            <option value="private" ${p.public_visibility==='private'?'selected':''}>Private</option>
          </select></div>
      </div>
      <div id="profileAlert" class="alert hidden"></div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Profile →</button>
    </div>

    <div class="section-card">
      <h3 class="mb-1">Skills</h3>
      <p class="text-sm text-grey mb-2">Technical and maker skills you have</p>
      <div class="tag-list" id="skills-list">${renderTags(p.skills,'skills')}</div>
      <div class="tag-input-row">
        <input id="skills-inp" class="form-input" placeholder="e.g. Arduino, PCB Design" style="flex:1;"
          onkeydown="if(event.key==='Enter'){addTag('skills');event.preventDefault();}">
        <button class="btn btn-sm btn-teal" onclick="addTag('skills')">Add</button>
      </div>
    </div>

    <div class="section-card">
      <h3 class="mb-1">Tools &amp; Equipment</h3>
      <p class="text-sm text-grey mb-2">Tools you can use</p>
      <div class="tag-list" id="tools-list">${renderTags(p.tools,'tools')}</div>
      <div class="tag-input-row">
        <input id="tools-inp" class="form-input" placeholder="e.g. Laser Cutter, 3D Printer" style="flex:1;"
          onkeydown="if(event.key==='Enter'){addTag('tools');event.preventDefault();}">
        <button class="btn btn-sm btn-teal" onclick="addTag('tools')">Add</button>
      </div>
    </div>

    <div class="section-card">
      <h3 class="mb-1">Themes &amp; Interests</h3>
      <p class="text-sm text-grey mb-2">Areas you're passionate about</p>
      <div class="tag-list" id="themes-list">${renderTags(p.themes,'themes')}</div>
      <div class="tag-input-row">
        <input id="themes-inp" class="form-input" placeholder="e.g. IoT, Robotics, Sustainability" style="flex:1;"
          onkeydown="if(event.key==='Enter'){addTag('themes');event.preventDefault();}">
        <button class="btn btn-sm btn-teal" onclick="addTag('themes')">Add</button>
      </div>
    </div>`;
}

function renderTags(arr, field) {
  return (arr||[]).map((t,i) =>
    `<span class="tag-item">${t}<span class="tag-rm" onclick="removeTag('${field}',${i})">×</span></span>`
  ).join('');
}

function getCurrentTags(field) {
  return Array.from(document.querySelectorAll(`#${field}-list .tag-item`))
    .map(el => el.childNodes[0].textContent.trim());
}

function addTag(field) {
  const inp = $(`${field}-inp`);
  const val = inp.value.trim();
  if (!val) return;
  const current = getCurrentTags(field);
  if (current.includes(val)) { inp.value=''; return; }
  current.push(val);
  $(`${field}-list`).innerHTML = renderTags(current, field);
  inp.value = '';
  saveField(field, current);
}

function removeTag(field, idx) {
  const current = getCurrentTags(field);
  current.splice(idx, 1);
  $(`${field}-list`).innerHTML = renderTags(current, field);
  saveField(field, current);
}

async function saveField(field, val) {
  await db.from('maker_profiles').update({ [field]: val }).eq('user_id', currentUser.id);
}

async function saveProfile() {
  const updates = {
    full_name:         $('f-name').value.trim(),
    slug:              slugify($('f-slug').value.trim()),
    headline:          $('f-headline').value.trim()||null,
    bio:               $('f-bio').value.trim()||null,
    city:              $('f-city').value.trim()||null,
    institution:       $('f-institution').value.trim()||null,
    role_type:         $('f-role').value||null,
    profile_photo_url: $('f-photo').value.trim()||null,
    public_visibility: $('f-pubvis').value,
  };
  if (!updates.full_name) { showAlert('profileAlert','Full name is required.'); return; }
  const { error } = await db.from('maker_profiles').update(updates).eq('user_id', currentUser.id);
  if (error) { showAlert('profileAlert', error.message); return; }
  showAlert('profileAlert','Profile saved!','success');
  profileData = { ...profileData, ...updates };
  renderSidebar('profile', profileData, currentUser);
}
</script>
</body>
</html>
