<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; border: 2px solid var(--ink); margin-bottom: 2rem; }
    .stat-cell { padding: 1.25rem; text-align: center; border-right: 2px solid var(--ink); }
    .stat-cell:last-child { border-right: none; }
    .s-num { font-size: 2rem; font-weight: 800; color: var(--orange); line-height: 1; }
    .s-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey-dark); margin-top: 0.3rem; font-family: var(--font-mono); }
    @media(max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr);} .stat-cell:nth-child(2){border-right:none;} .stat-cell:nth-child(1),.stat-cell:nth-child(2){border-bottom:2px solid var(--ink);} }
    .cred-item { display:flex;align-items:center;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--grey); }
    .cred-item:last-child{border-bottom:none;}
    .cred-icon{width:36px;height:36px;background:var(--orange);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div id="dashContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script>
<script src="js/sidebar.js"></script>
<script>
const TIERS  = ['Curious','Tinkerer','Builder','Maker','Innovator','Lab Pro'];
const TBADGE = ['badge-grey','badge-orange','badge-indigo','badge-teal','badge-orange','badge-green'];

onReady(async () => {
  try {
    await renderNav('dashboard.html');
    const user = await Auth.requireAuth('auth.html');
    if (!user) return;

    const { data: prof } = await db.from('maker_profiles').select('*').eq('user_id', user.id).single();
    const name = prof?.full_name || user.user_metadata?.full_name || 'Maker';
    const tier = prof?.verification_tier ?? 0;
    renderSidebar('overview', prof, user);

    // Parallel loads — using real column names from DB
    const [enrollRes, projRes, badgeRes, evRes] = await Promise.all([
      db.from('explorer_enrollments').select('id, explorer_track_id, status, progress_percent, completed_at').eq('user_id', user.id),
      db.from('project_members').select('projects(id,title,status,approval_status)').eq('user_id', user.id).limit(3),
      db.from('user_badges').select('*, badges(name,badge_type)').eq('user_id', user.id).order('issued_at', { ascending: false }).limit(5),
      db.from('event_registrations').select('*, events(id,title,event_type,start_at)').eq('user_id', user.id).order('created_at', { ascending: false }).limit(4),
    ]);

    const enrollments = enrollRes.data || [];
    const projects    = (projRes.data || []).map(m => m.projects).filter(Boolean);
    const badges      = badgeRes.data || [];
    const events      = (evRes.data || []).map(r => r.events).filter(Boolean);
    const completed   = enrollments.filter(e => e.completed_at).length;

    $('dashContent').innerHTML = `
      <div class="page-header">
        <div class="ph-label">// Overview</div>
        <div class="flex-between" style="flex-wrap:wrap;gap:.75rem;">
          <h1>Welcome back, ${name.split(' ')[0]}.</h1>
          <span class="badge ${TBADGE[tier]} mono">${TIERS[tier]}</span>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-cell"><div class="s-num">${completed}</div><div class="s-lbl">Tracks Done</div></div>
        <div class="stat-cell"><div class="s-num">${projects.length}</div><div class="s-lbl">Projects</div></div>
        <div class="stat-cell"><div class="s-num">${badges.length}</div><div class="s-lbl">Badges</div></div>
        <div class="stat-cell"><div class="s-num">${events.length}</div><div class="s-lbl">Events</div></div>
      </div>
      <div class="grid-2" style="gap:2rem;">
        <div>
          <div class="flex-between mb-3"><h3>Recent Badges</h3><a href="dashboard-credentials.html" class="btn btn-sm btn-ghost">All →</a></div>
          <div class="card" style="padding:1rem;">
            ${badges.length === 0
              ? `<div class="text-center p-3 text-grey text-sm">No badges yet — complete a track or attend an event.</div>`
              : badges.map(b => `<div class="cred-item">
                  <div class="cred-icon">🏅</div>
                  <div style="flex:1;">
                    <div class="bold text-sm">${b.badges?.name || 'Badge'}</div>
                    <div class="text-xs mono text-grey">${b.badges?.badge_type || ''} · ${formatDate(b.issued_at)}</div>
                  </div>
                </div>`).join('')}
          </div>
        </div>
        <div>
          <div class="flex-between mb-3"><h3>My Projects</h3><a href="dashboard-projects.html" class="btn btn-sm btn-ghost">All →</a></div>
          ${projects.length === 0
            ? `<div class="empty-state" style="padding:2rem;">
                <div class="empty-icon">🔧</div><h3>No projects yet</h3><p>Propose or join a project.</p>
                <a href="projects.html" class="btn btn-primary btn-sm mt-2">Browse Projects →</a>
              </div>`
            : projects.map(p => `<div class="card card-hover mb-2" style="padding:1.25rem;">
                <div class="flex-between mb-1">${statusBadge(p.status)}<span class="badge badge-grey">${p.approval_status || ''}</span></div>
                <div class="bold">${p.title}</div>
              </div>`).join('')}
        </div>
        <div>
          <div class="flex-between mb-3"><h3>My Learning</h3><a href="dashboard-learning.html" class="btn btn-sm btn-ghost">All →</a></div>
          ${enrollments.length === 0
            ? `<div class="empty-state" style="padding:2rem;">
                <div class="empty-icon">📡</div><h3>No tracks enrolled</h3>
                <a href="explorer.html" class="btn btn-primary btn-sm mt-2">Browse Tracks →</a>
              </div>`
            : `<div class="card" style="padding:1rem;">
                <div class="flex-between mb-2">
                  <span class="bold text-sm">${enrollments.length} track${enrollments.length !== 1 ? 's' : ''} enrolled</span>
                  <span class="badge badge-green">${completed} done</span>
                </div>
                <a href="dashboard-learning.html" class="btn btn-sm btn-indigo">View Progress →</a>
              </div>`}
        </div>
        <div>
          <div class="flex-between mb-3"><h3>My Events</h3><a href="dashboard-events.html" class="btn btn-sm btn-ghost">All →</a></div>
          ${events.length === 0
            ? `<div class="empty-state" style="padding:2rem;">
                <div class="empty-icon">🎯</div><h3>No events registered</h3>
                <a href="events.html" class="btn btn-primary btn-sm mt-2">Browse Events →</a>
              </div>`
            : events.map(ev => `<div class="card card-hover mb-2" style="padding:1.25rem;">
                <div class="flex-between mb-1">
                  <span class="badge badge-indigo">${ev.event_type || 'Event'}</span>
                  <span class="text-xs mono text-grey">${formatDate(ev.start_at)}</span>
                </div>
                <div class="bold text-sm">${ev.title}</div>
              </div>`).join('')}
        </div>
      </div>`;
  } catch (err) {
    $('dashContent').innerHTML = `<div class="alert alert-error">Dashboard error: ${err.message}</div>`;
    console.error('Dashboard error:', err);
  }
});
</script>
</body>
</html>
