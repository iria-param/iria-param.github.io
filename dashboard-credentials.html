<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credentials — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .badge-card{border:2px solid var(--ink);box-shadow:var(--shadow);padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;background:var(--paper);margin-bottom:1rem;}
    .badge-icon{width:56px;height:56px;background:var(--orange);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0;}
    .badge-info{flex:1;}
    .badge-name{font-weight:800;font-size:.95rem;margin-bottom:.25rem;}
    .badge-meta{font-size:.7rem;font-family:var(--font-mono);color:var(--grey-dark);}
    .empty-icon-lg{font-size:3rem;margin-bottom:1rem;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// user_badges + badges</div>
      <h1>My Credentials</h1>
    </div>

    <!-- Filter tabs -->
    <div class="filter-row" style="margin-bottom:1.5rem;">
      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('completion',this)">Completion</button>
      <button class="filter-chip" onclick="setFilter('event',this)">Event</button>
      <button class="filter-chip" onclick="setFilter('certification',this)">Certification</button>
    </div>

    <div id="credContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let allBadges = [];
let currentFilter = 'all';

onReady(async () => {
  try {
    await renderNav();
    const user = await Auth.requireAuth('auth.html');
    if (!user) return;
    const { data: prof } = await db.from('maker_profiles').select('*').eq('user_id', user.id).single();
    renderSidebar('credentials', prof, user);

    const { data, error } = await db
      .from('user_badges')
      .select('*, badges(id,name,slug,description,badge_type,image_url)')
      .eq('user_id', user.id)
      .order('issued_at', { ascending: false });

    if (error) { $('credContent').innerHTML=`<div class="alert alert-error">${error.message}</div>`; return; }
    allBadges = data || [];
    render();
  } catch(e) {
    $('credContent').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
});

function setFilter(f, btn) {
  currentFilter = f;
  $$('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = currentFilter === 'all'
    ? allBadges
    : allBadges.filter(b => b.badges?.badge_type === currentFilter);

  if (!list.length) {
    $('credContent').innerHTML = `<div class="empty-state">
      <div class="empty-icon-lg">🏅</div>
      <h3>No ${currentFilter === 'all' ? '' : currentFilter + ' '}badges yet</h3>
      <p>Complete tracks or attend events to earn credentials.</p>
      <a href="explorer.html" class="btn btn-primary btn-sm mt-2">Browse Tracks →</a>
    </div>`;
    return;
  }

  $('credContent').innerHTML = list.map(b => {
    const badge = b.badges || {};
    const typeColor = { completion:'badge-teal', event:'badge-indigo', certification:'badge-orange' };
    return `<div class="badge-card">
      <div class="badge-icon">${badge.image_url ? `<img src="${badge.image_url}" style="width:100%;height:100%;object-fit:cover;">` : '🏅'}</div>
      <div class="badge-info">
        <div class="flex-between mb-1">
          <div class="badge-name">${badge.name || 'Badge'}</div>
          <span class="badge ${typeColor[badge.badge_type]||'badge-grey'}">${badge.badge_type||'badge'}</span>
        </div>
        ${badge.description ? `<p class="text-sm text-grey mb-2">${badge.description}</p>` : ''}
        <div class="badge-meta">Issued: ${formatDate(b.issued_at)}</div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
